  <!-- Arms -->
  <line x1="16" y1="14.5" x2="8.5" y2="20" stroke="#7c6af5" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="16" y1="14.5" x2="23.5" y2="20" stroke="#7c6af5" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="16" y1="22" x2="10" y2="30" stroke="#7c6af5" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="22" y2="30" stroke="#7c6af5" stroke-width="1.7" stroke-linecap="round"/>
